# Render Blueprint — one-click deploy of the full RecapAI demo in mock mode.
#
#   1. Push this repo to GitHub.
#   2. In the Render dashboard: New → Blueprint → pick this repo.
#   3. Render provisions all three resources below and wires them together.
#
# Everything runs with LLM_PROVIDER=mock, so the demo needs NO API keys and makes
# no outbound calls. To use real OpenAI instead, set LLM_PROVIDER=openai and add
# OPENAI_API_KEY on the `recapai-api` service.
#
# NOTE: the two URLs below assume the service subdomains `recapai-api` and
# `recapai-web` are free. If Render assigns different URLs, update VITE_API_URL
# (web) and CORS_ORIGINS (api) to match, then redeploy.

databases:
  - name: recapai-db
    databaseName: recapai
    plan: free

services:
  # ── Backend: FastAPI + Postgres (Docker) ──────────────────────────────────
  - type: web
    name: recapai-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: LLM_PROVIDER
        value: mock
      - key: DATABASE_URL
        fromDatabase:
          name: recapai-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://recapai-web.onrender.com

  # ── Frontend: static Vite build ───────────────────────────────────────────
  - type: web
    name: recapai-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://recapai-api.onrender.com/api
    routes:
      # SPA fallback so client-side routes (e.g. /meeting/:id) resolve to index.html
      - type: rewrite
        source: /*
        destination: /index.html
